worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    upstream frontend {
        server frontend:5000;
    }

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;

        # Django Channels - needs the WebSocket upgrade headers and a long
        # read timeout since chat connections stay open.
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # Uploaded avatars, served straight off the shared volume - no
        # need to round-trip through Django/Express for static image bytes.
        location /media/ {
            alias /app/media/;
        }

        # Everything else (the React app + the /api/* routes it proxies
        # server-side to Django) goes to the Express app.
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # To serve over HTTPS: drop your certificate/key into ./certs (mounted at
    # /etc/nginx/ssl by docker-compose.yml) and add a second server block,
    # e.g.:
    #
    # server {
    #     listen 443 ssl;
    #     ssl_certificate     /etc/nginx/ssl/yourdomain.crt;
    #     ssl_certificate_key /etc/nginx/ssl/yourdomain.key;
    #
    #     location /ws/ {
    #         proxy_pass http://backend;
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection "upgrade";
    #         proxy_set_header Host $host;
    #         proxy_read_timeout 3600s;
    #     }
    #
    #     location / {
    #         proxy_pass http://frontend;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
}
